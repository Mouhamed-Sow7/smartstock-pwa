<div class="login-page">
  <div class="login-card">
    <div class="logo-area">
      <div class="app-name">SmartStock</div>
      <div class="app-sub">Gestion commerciale mobile-first</div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Email ou téléphone</mat-label>
        <!-- type="text" pas "email" — le champ accepte aussi les emails @slug.sm et les téléphones -->
        <input matInput type="text" formControlName="identifiant"
          autocomplete="username"
          placeholder="patron@demo.com ou 77 123 45 67" />
        <mat-icon matSuffix>person</mat-icon>
        <mat-error *ngIf="loginForm.get('identifiant')?.hasError('required')">
          Identifiant requis
        </mat-error>
        <mat-error *ngIf="loginForm.get('identifiant')?.hasError('emailOuTelephone')">
          Saisir un email valide ou un numéro de téléphone sénégalais
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input
          matInput
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          autocomplete="current-password"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          aria-label="Afficher le mot de passe"
          (click)="showPassword = !showPassword"
        >
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Le mot de passe est requis
        </mat-error>
        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
          Minimum 4 caractères
        </mat-error>
      </mat-form-field>

      <button
        mat-raised-button
        class="btn-login"
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
      >
        <mat-spinner diameter="18" *ngIf="isLoading" style="display:inline-block;margin-right:6px"></mat-spinner>
        {{ isLoading ? 'Connexion...' : 'Se connecter' }}
      </button>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
